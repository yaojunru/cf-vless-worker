name = "cf-vless-worker"
main = "src/worker.js"
compatibility_date = "2026-07-23"

# Required runtime variables:
# - UUID: VLESS UUID
# - WS_PATH: hidden WebSocket path, for example /assets/your-random-path
#
# Set them as secrets:
#   npx wrangler secret put UUID
#   npx wrangler secret put WS_PATH
#
# Custom domains are intentionally not committed here because they identify
# the account owner's private zone. Bind one explicitly at deploy time:
#   npx wrangler deploy --domain proxy.example.com --keep-vars
